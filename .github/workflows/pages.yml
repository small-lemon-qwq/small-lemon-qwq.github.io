name: Deploy Website and Hexo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: hexo/package-lock.json

      - name: Install npm 11.7.0
        run: npm install --global npm@11.7.0

      - name: Install Pandoc
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install \
            --yes \
            --no-install-recommends \
            pandoc

          echo "Pandoc executable:"
          command -v pandoc

          echo "Pandoc version:"
          pandoc --version

      - name: Show build environment
        working-directory: ./hexo
        run: |
          echo "Node:"
          node --version

          echo "npm:"
          npm --version

          echo "Pandoc:"
          pandoc --version

      - name: Install Hexo dependencies
        working-directory: ./hexo
        run: npm ci

      - name: Show Hexo versions
        working-directory: ./hexo
        run: |
          npx hexo version

          echo "=== Hexo packages ==="
          npm ls hexo || true
          npm ls hexo-theme-next || true
          npm ls hexo-next-giscus || true

          echo "=== Markdown renderers ==="
          npm ls hexo-renderer-pandoc || true
          npm ls hexo-renderer-marked || true
          npm ls hexo-renderer-markdown-it || true

          echo "=== Math rendering packages ==="
          npm ls hexo-filter-mathjax || true
          npm ls hexo-renderer-mathjax || true

      - name: Generate Hexo website
        working-directory: ./hexo
        run: |
          npx hexo clean
          npx hexo generate --debug

      - name: Verify Hexo output
        shell: bash
        run: |
          echo "=== Generated Hexo files ==="
          find ./hexo/public -maxdepth 4 -type f \
            | sort \
            | head -200

          if [ ! -f ./hexo/public/index.html ]; then
            echo "::error::hexo/public/index.html does not exist"
            exit 1
          fi

          HEXO_INDEX_SIZE=$(stat -c%s ./hexo/public/index.html)

          echo "Hexo index.html size: ${HEXO_INDEX_SIZE} bytes"

          if [ "${HEXO_INDEX_SIZE}" -eq 0 ]; then
            echo "::error::Hexo generated an empty index.html"
            exit 1
          fi

          echo "=== HTML sizes ==="
          find ./hexo/public \
            -type f \
            -name "*.html" \
            -printf "%10s bytes  %p\n" \
            | sort -n

          echo "=== First 20 lines of Hexo index.html ==="
          sed -n '1,20p' ./hexo/public/index.html

      - name: Prepare deployment directory
        shell: bash
        run: |
          rm -rf ./dist
          mkdir -p ./dist
          mkdir -p ./dist/hexo

          # 将个人主页复制到网站根目录
          if [ -d ./site ]; then
            cp -a ./site/. ./dist/
          else
            echo "::warning::site/ directory does not exist"
          fi

          # 将 Hexo 网站复制到 /hexo/ 路径
          cp -a ./hexo/public/. ./dist/hexo/

          # 禁止 GitHub Pages 使用 Jekyll 再次处理文件
          touch ./dist/.nojekyll

      - name: Verify final deployment
        shell: bash
        run: |
          echo "=== Deployment files ==="
          find ./dist -maxdepth 4 -type f \
            | sort \
            | head -300

          if [ ! -s ./dist/hexo/index.html ]; then
            echo "::error::dist/hexo/index.html is missing or empty"
            exit 1
          fi

          echo "Hexo deployed index:"
          wc -c ./dist/hexo/index.html

          if [ -f ./dist/index.html ]; then
            echo "Root website index:"
            wc -c ./dist/index.html
          else
            echo "::warning::dist/index.html does not exist"
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-24.04
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4