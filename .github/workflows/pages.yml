- name: Checkout repository
  uses: actions/checkout@v4
  with:
    submodules: recursive

- name: Setup Node.js
  uses: actions/setup-node@v4
  with:
    node-version: 20
    cache: npm
    cache-dependency-path: hexo/package-lock.json

- name: Install Hexo dependencies
  working-directory: ./hexo
  run: npm ci

- name: Check Hexo environment
  working-directory: ./hexo
  run: |
    node --version
    npm --version
    npx hexo version

    echo "=== Theme directory ==="
    find themes/next -maxdepth 2 -type f | head -100 || true

    echo "=== Theme layouts ==="
    ls -lah themes/next/layout || true

    echo "=== Tracked configurations ==="
    ls -lah _config.yml _config.next.yml || true

- name: Generate Hexo site
  working-directory: ./hexo
  run: |
    npx hexo clean
    npx hexo generate --debug

- name: Verify Hexo output
  run: |
    ls -lah ./hexo/public/index.html
    wc -c ./hexo/public/index.html

    if [ ! -s ./hexo/public/index.html ]; then
      echo "::error::Hexo generated an empty index.html"
      exit 1
    fi