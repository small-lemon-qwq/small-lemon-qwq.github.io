name: Deploy Website and Hexo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hexo/package-lock.json

      - name: Install Hexo dependencies
        working-directory: ./hexo
        run: npm ci

      - name: Generate Hexo site
        working-directory: ./hexo
        run: npx hexo clean && npx hexo generate

      - name: Prepare deployment directory
        run: |
          mkdir -p ./dist
          cp -a ./site/. ./dist/
          mkdir -p ./dist/hexo
          cp -a ./hexo/public/. ./dist/hexo/
          touch ./dist/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist
      - name: Generate Hexo site
        working-directory: ./hexo
        run: npx hexo clean && npx hexo generate

      - name: Verify generated Hexo files
        run: |
          echo "=== Hexo public files ==="
          find ./hexo/public -maxdepth 3 -type f | head -100

          test -s ./hexo/public/index.html || {
            echo "::error::hexo/public/index.html does not exist or is empty"
            exit 1
          }

          echo "index.html size:"
          wc -c ./hexo/public/index.html
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4